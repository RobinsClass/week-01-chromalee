name: Autograding Tests
on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
jobs:
  autograde:
    name: Run Assignment Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run tests
        run: cd assignment && python test_assignment.py
